{% extends 'base.html' %}

{% block title %}Empty Cart - Aura{% endblock %}

{% block content %}
<div class="py-32 px-6 md:px-8 lg:px-12">
    <div class="max-w-2xl mx-auto text-center">
        <div class="text-8xl mb-8">✨</div>
        
        <h1 class="text-6xl font-bold mb-6" style="font-family: 'Playfair Display', serif;">
            Your Cart is Empty
        </h1>
        
        <p class="text-xl text-gray-700 mb-12 leading-relaxed">
            Discover our collection of premium fragrances and start your journey to find your signature scent.
        </p>
        
        <div class="border-8 border-black p-12 mb-12">
            <p class="text-sm font-mono tracking-widest mb-4">GET STARTED</p>
            <a href="{% url 'payments:products' %}" class="btn-primary inline-block">
                Browse Collection
            </a>
        </div>
        
        <div class="flex justify-center gap-6">
            <a href="/" class="btn-secondary">Back to Home</a>
        </div>
    </div>
</div>
{% endblock %}
