<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#C18C5D;stop-opacity:0.2" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Glow background -->
  <circle cx="100" cy="100" r="95" fill="url(#glowGradient)" filter="url(#glow)"/>
  
  <!-- Decorative circle outline -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#C18C5D" stroke-width="2" opacity="0.6"/>
  
  <!-- Lotus flower petals -->
  <g fill="none" stroke="#C18C5D" stroke-width="1.5" opacity="0.9">
    <!-- Top petal -->
    <path d="M 100 50 Q 95 70 100 85 Q 105 70 100 50"/>
    
    <!-- Upper right petal -->
    <path d="M 128 62 Q 118 75 110 85 Q 120 80 128 62"/>
    
    <!-- Lower right petal -->
    <path d="M 140 100 Q 125 105 112 108 Q 130 110 140 100"/>
    
    <!-- Lower right bottom petal -->
    <path d="M 128 138 Q 120 120 110 115 Q 120 130 128 138"/>
    
    <!-- Bottom petal -->
    <path d="M 100 150 Q 105 130 100 115 Q 95 130 100 150"/>
    
    <!-- Lower left petal -->
    <path d="M 72 138 Q 80 120 90 115 Q 80 130 72 138"/>
    
    <!-- Upper left petal -->
    <path d="M 60 100 Q 75 105 88 108 Q 70 110 60 100"/>
    
    <!-- Upper left top petal -->
    <path d="M 72 62 Q 82 75 90 85 Q 80 80 72 62"/>
  </g>
  
  <!-- Central lotus bloom -->
  <g fill="#C18C5D" opacity="0.8">
    <!-- Inner petals -->
    <ellipse cx="100" cy="80" rx="4" ry="8"/>
    <ellipse cx="115" cy="90" rx="4" ry="8" transform="rotate(45 115 90)"/>
    <ellipse cx="120" cy="105" rx="4" ry="8" transform="rotate(90 120 105)"/>
    <ellipse cx="115" cy="120" rx="4" ry="8" transform="rotate(135 115 120)"/>
    <ellipse cx="100" cy="130" rx="4" ry="8" transform="rotate(180 100 130)"/>
    <ellipse cx="85" cy="120" rx="4" ry="8" transform="rotate(225 85 120)"/>
    <ellipse cx="80" cy="105" rx="4" ry="8" transform="rotate(270 80 105)"/>
    <ellipse cx="85" cy="90" rx="4" ry="8" transform="rotate(315 85 90)"/>
  </g>
  
  <!-- Center stamen -->
  <circle cx="100" cy="105" r="3" fill="#C18C5D" opacity="0.9"/>
  
  <!-- Decorative accents -->
  <g fill="#D4A574" opacity="0.5">
    <circle cx="65" cy="70" r="2"/>
    <circle cx="135" cy="70" r="2"/>
    <circle cx="140" cy="135" r="2"/>
    <circle cx="60" cy="135" r="2"/>
  </g>
</svg>