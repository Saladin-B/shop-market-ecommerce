<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:#F3E5AB;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#E8D5A0;stop-opacity:0.1" />
        </radialGradient>
    </defs>
    
    <!-- Background glow -->
    <circle cx="100" cy="100" r="85" fill="url(#glowGradient)" filter="url(#glow)"/>
    
    <!-- Outer circle stroke -->
    <circle cx="100" cy="100" r="80" fill="none" stroke="#C18C5D" stroke-width="2" opacity="0.4"/>
    
    <!-- Inner decorative circle -->
    <circle cx="100" cy="100" r="70" fill="none" stroke="#C18C5D" stroke-width="1" opacity="0.3"/>
    
    <!-- Lotus flower -->
    <g transform="translate(100, 85)">
        <!-- Outer petals -->
        <path d="M 0,-25 Q 8,-20 10,-8 Q 12,-15 15,-22" fill="none" stroke="#C18C5D" stroke-width="2" stroke-linecap="round"/>
        <path d="M 0,-25 Q -8,-20 -10,-8 Q -12,-15 -15,-22" fill="none" stroke="#C18C5D" stroke-width="2" stroke-linecap="round"/>
        
        <!-- Side petals -->
        <path d="M 20,-8 Q 20,-2 18,8" fill="none" stroke="#C18C5D" stroke-width="2" stroke-linecap="round"/>
        <path d="M -20,-8 Q -20,-2 -18,8" fill="none" stroke="#C18C5D" stroke-width="2" stroke-linecap="round"/>
        
        <!-- Inner petals -->
        <path d="M 12,5 Q 10,12 5,15" fill="none" stroke="#C18C5D" stroke-width="2" stroke-linecap="round"/>
        <path d="M -12,5 Q -10,12 -5,15" fill="none" stroke="#C18C5D" stroke-width="2" stroke-linecap="round"/>
        
        <!-- Center bloom -->
        <circle cx="0" cy="0" r="3" fill="#C18C5D"/>
    </g>
    
    <!-- Decorative dots -->
    <circle cx="50" cy="50" r="1.5" fill="#C18C5D" opacity="0.4"/>
    <circle cx="150" cy="50" r="1.5" fill="#C18C5D" opacity="0.4"/>
    <circle cx="50" cy="150" r="1.5" fill="#C18C5D" opacity="0.4"/>
    <circle cx="150" cy="150" r="1.5" fill="#C18C5D" opacity="0.4"/>
</svg>
